<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhan — Portfolio</title>
<style>
@font-face {
  font-family: 'Pixel';
  src: url('data:font/woff2;base64,') format('woff2');
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0f1b;
  --bg2: #1a1a2e;
  --gold: #70b8f0;
  --gold-dim: #4080b0;
  --cyan: #40d8f0;
  --green: #50e850;
  --red: #e85050;
  --white: #e8e8e8;
  --gray: #606078;
  --pixel: 4px;
}

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  image-rendering: pixelated;
}

/* Scanlines */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.08) 2px,
    rgba(0, 0, 0, 0.08) 4px
  );
  pointer-events: none;
  z-index: 100;
}

/* CRT Flicker */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
  pointer-events: none;
  z-index: 99;
}

/* Stars Background */
canvas#stars {
  position: fixed; inset: 0;
  z-index: 0;
}

/* Main Container */
.screen {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 640px;
  padding: 24px;
}

/* Title */
.title-area {
  text-align: center;
  margin-bottom: 48px;
}

.pixel-art-title {
  font-size: clamp(36px, 8vw, 64px);
  font-weight: bold;
  color: var(--gold);
  text-shadow:
    3px 3px 0 #1a4060,
    -1px -1px 0 #a0d4f0;
  letter-spacing: 6px;
  margin-bottom: 8px;
  animation: title-glow 3s ease-in-out infinite;
}

@keyframes title-glow {
  0%, 100% { text-shadow: 3px 3px 0 #1a4060, -1px -1px 0 #a0d4f0, 0 0 20px rgba(112, 184, 240, 0.1); }
  50% { text-shadow: 3px 3px 0 #1a4060, -1px -1px 0 #a0d4f0, 0 0 30px rgba(112, 184, 240, 0.3); }
}

.subtitle {
  font-size: clamp(10px, 2.5vw, 14px);
  color: var(--cyan);
  letter-spacing: 4px;
  text-transform: uppercase;
}

/* Pixel Border Frame */
.frame {
  border: var(--pixel) solid var(--gold-dim);
  border-radius: 2px;
  padding: 32px 28px;
  background: rgba(15, 15, 27, 0.9);
  box-shadow:
    inset 0 0 0 var(--pixel) var(--bg),
    inset 0 0 0 calc(var(--pixel) * 2) rgba(240, 192, 64, 0.15);
  position: relative;
}

.frame::before {
  content: '♦ MAIN MENU ♦';
  position: absolute;
  top: -10px;
  left: 24px;
  background: var(--bg);
  padding: 0 12px;
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 3px;
}

/* Menu Items */
.menu-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.menu-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  cursor: pointer;
  border: 2px solid transparent;
  border-radius: 2px;
  transition: none;
  position: relative;
  text-decoration: none;
  color: var(--white);
  opacity: 0;
  transform: translateX(-20px);
}

.menu-item.visible {
  opacity: 1;
  transform: translateX(0);
  transition: opacity 0.3s, transform 0.3s;
}

.menu-item .arrow {
  color: var(--gold);
  font-size: 16px;
  opacity: 0;
  width: 16px;
  transition: none;
}

.menu-item.active {
  background: rgba(240, 192, 64, 0.08);
  border-color: rgba(240, 192, 64, 0.25);
}

.menu-item.active .arrow {
  opacity: 1;
  animation: arrow-blink 0.6s step-end infinite;
}

.menu-item.active .menu-label {
  color: var(--gold);
}

@keyframes arrow-blink {
  50% { opacity: 0.3; }
}

.menu-label {
  font-size: clamp(14px, 3vw, 18px);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.menu-tag {
  margin-left: auto;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 2px;
  letter-spacing: 1px;
}

.tag-lv {
  color: var(--green);
  border: 1px solid rgba(80, 232, 80, 0.3);
}
.tag-new {
  color: var(--red);
  border: 1px solid rgba(232, 80, 80, 0.3);
  animation: tag-pulse 2s ease-in-out infinite;
}
.tag-quest {
  color: var(--cyan);
  border: 1px solid rgba(64, 216, 240, 0.3);
}

@keyframes tag-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Description */
.desc-box {
  margin-top: 20px;
  padding: 16px;
  border-top: 2px solid rgba(240, 192, 64, 0.15);
  min-height: 52px;
}

.desc-text {
  font-size: 12px;
  color: var(--gray);
  letter-spacing: 1px;
  line-height: 1.6;
}

.desc-text .typed-cursor {
  display: inline-block;
  width: 8px;
  height: 14px;
  background: var(--gold);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.5s step-end infinite;
}

@keyframes blink { 50% { opacity: 0; } }

/* Footer */
.footer {
  text-align: center;
  margin-top: 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  opacity: 0;
}
.footer.visible { opacity: 1; transition: opacity 0.5s; }

.footer-text {
  font-size: 10px;
  color: var(--gray);
  letter-spacing: 2px;
}

.controls {
  display: flex;
  gap: 12px;
}

.key-hint {
  font-size: 10px;
  color: var(--gray);
  display: flex;
  align-items: center;
  gap: 4px;
}

.key {
  display: inline-block;
  padding: 1px 6px;
  border: 1px solid var(--gray);
  border-radius: 2px;
  font-size: 9px;
  color: var(--white);
}

/* Select */
.menu-item.selected {
  animation: select-flash 0.1s step-end 3;
}

@keyframes select-flash {
  50% { opacity: 0.2; }
}

/* Start */
.press-start {
  text-align: center;
  margin-bottom: 32px;
  opacity: 0;
}
.press-start.visible {
  opacity: 1;
  transition: opacity 0.5s;
}
.press-start-text {
  font-size: 14px;
  color: var(--white);
  letter-spacing: 4px;
  animation: press-blink 1.2s step-end infinite;
}
@keyframes press-blink {
  0%, 80% { opacity: 1; }
  40%, 60% { opacity: 0; }
}

/* Intro screen */
.intro-screen {
  position: fixed; inset: 0;
  z-index: 50;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 48px;
  transition: opacity 0.5s;
}
.intro-screen.hidden {
  opacity: 0;
  pointer-events: none;
}

.intro-logo {
  font-size: clamp(48px, 12vw, 80px);
  font-weight: bold;
  color: var(--gold);
  text-shadow: 4px 4px 0 #805800;
  letter-spacing: 8px;
  animation: title-glow 3s ease-in-out infinite;
}

.intro-sub {
  font-size: 12px;
  color: var(--cyan);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-top: -32px;
}

/* Sound toggle */
.sound-btn {
  position: fixed;
  bottom: 16px;
  right: 16px;
  z-index: 101;
  background: none;
  border: 1px solid var(--gray);
  color: var(--gray);
  font-family: 'Courier New', monospace;
  font-size: 10px;
  padding: 4px 8px;
  cursor: pointer;
  border-radius: 2px;
  letter-spacing: 1px;
  opacity: 0;
  transition: opacity 0.5s;
}
.sound-btn.visible { opacity: 1; }
.sound-btn:hover { color: var(--gold); border-color: var(--gold); }

@media (max-width: 500px) {
  .screen { padding: 16px; }
  .frame { padding: 24px 16px; }
  .menu-item { padding: 10px 12px; }
  .controls { display: none; }
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="intro-screen" id="intro">
  <div class="intro-logo">NHAN</div>
  <div class="intro-sub">Portfolio</div>
  <div class="press-start" id="pressStart">
    <span class="press-start-text">— PRESS START —</span>
  </div>
</div>

<div class="screen" id="mainScreen" style="display:none;">
  <div class="title-area">
    <div class="pixel-art-title">NHAN</div>
    <div class="subtitle">~ Portfolio ~</div>
  </div>

  <div class="frame">
    <ul class="menu-list" id="menuList">
      <li class="menu-item" data-index="0" data-desc="View the adventurer's profile, stats, and journey so far.">
        <span class="arrow">▶</span>
        <span class="menu-label">About Me</span>
      </li>
      <li class="menu-item" data-index="1" data-desc="Browse completed quests and legendary builds.">
        <span class="arrow">▶</span>
        <span class="menu-label">Projects</span>
      </li>
      <li class="menu-item" data-index="2" data-desc="Inspect the adventurer's equipped skills and abilities.">
        <span class="arrow">▶</span>
        <span class="menu-label">Skills</span>
      </li>
      <li class="menu-item" data-index="3" data-desc="Send a message via carrier pigeon. Or email. Either works.">
        <span class="arrow">▶</span>
        <span class="menu-label">Contact</span>
      </li>
    </ul>

    <div class="desc-box">
      <div class="desc-text" id="descText"></div>
    </div>
  </div>

  <div class="footer" id="footer">
    <div class="controls">
      <div class="key-hint"><span class="key">↑↓</span> Navigate</div>
      <div class="key-hint"><span class="key">Enter</span> Select</div>
    </div>
  </div>
</div>

<button class="sound-btn" id="soundBtn">SFX: ON</button>

<script>
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

for (let i = 0; i < 100; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() > 0.9 ? 2 : 1,
    speed: Math.random() * 0.3 + 0.05,
    blink: Math.random() * Math.PI * 2,
    blinkSpeed: Math.random() * 0.02 + 0.005
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.blink += s.blinkSpeed;
    const alpha = 0.3 + Math.sin(s.blink) * 0.3;
    ctx.fillStyle = `rgba(200, 200, 240, ${alpha})`;
    ctx.fillRect(Math.floor(s.x), Math.floor(s.y), s.size, s.size);
    s.y -= s.speed;
    if (s.y < -2) { s.y = canvas.height + 2; s.x = Math.random() * canvas.width; }
  });
  requestAnimationFrame(drawStars);
}
drawStars();

let audioCtx = null;
let sfxEnabled = true;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBeep(freq = 800, duration = 0.06, vol = 0.08) {
  if (!sfxEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.value = freq;
  gain.gain.value = vol;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playSelect() {
  if (!sfxEnabled || !audioCtx) return;
  playBeep(600, 0.05, 0.06);
  setTimeout(() => playBeep(900, 0.08, 0.06), 60);
}

const soundBtn = document.getElementById('soundBtn');
soundBtn.addEventListener('click', () => {
  sfxEnabled = !sfxEnabled;
  soundBtn.textContent = sfxEnabled ? 'SFX: ON' : 'SFX: OFF';
});

const intro = document.getElementById('intro');
const pressStart = document.getElementById('pressStart');
const mainScreen = document.getElementById('mainScreen');

setTimeout(() => pressStart.classList.add('visible'), 1500);
setTimeout(() => soundBtn.classList.add('visible'), 2000);

function startGame() {
  initAudio();
  playSelect();
  intro.classList.add('hidden');
  setTimeout(() => {
    intro.style.display = 'none';
    mainScreen.style.display = 'block';
    revealMenu();
  }, 500);
}

intro.addEventListener('click', startGame);
document.addEventListener('keydown', function onStart(e) {
  if (intro.style.display !== 'none' && !intro.classList.contains('hidden')) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      startGame();
    }
  }
});

const menuItems = document.querySelectorAll('.menu-item');
const descText = document.getElementById('descText');
const footer = document.getElementById('footer');
let activeIndex = 0;
let typingTimeout = null;

function setActive(index) {
  menuItems.forEach(item => item.classList.remove('active'));
  activeIndex = index;
  menuItems[index].classList.add('active');
  typeDesc(menuItems[index].dataset.desc);
}

function typeDesc(text) {
  clearTimeout(typingTimeout);
  descText.innerHTML = '';
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'typed-cursor';

  function type() {
    if (i < text.length) {
      descText.insertBefore(document.createTextNode(text[i]), cursor);
      i++;
      typingTimeout = setTimeout(type, 18);
    } else {
      setTimeout(() => cursor.remove(), 3000);
    }
  }
  descText.appendChild(cursor);
  type();
}

function revealMenu() {
  menuItems.forEach((item, i) => {
    setTimeout(() => {
      item.classList.add('visible');
      playBeep(400 + i * 80, 0.04, 0.04);
    }, i * 120);
  });

  setTimeout(() => {
    setActive(0);
    footer.classList.add('visible');
  }, menuItems.length * 120 + 200);
}

document.addEventListener('keydown', (e) => {
  if (mainScreen.style.display === 'none') return;

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    const next = (activeIndex - 1 + menuItems.length) % menuItems.length;
    playBeep(600, 0.04, 0.05);
    setActive(next);
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    const next = (activeIndex + 1) % menuItems.length;
    playBeep(600, 0.04, 0.05);
    setActive(next);
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    selectItem(activeIndex);
  }
});

menuItems.forEach((item, i) => {
  item.addEventListener('mouseenter', () => {
    if (activeIndex !== i) {
      playBeep(600, 0.04, 0.05);
      setActive(i);
    }
  });
  item.addEventListener('click', () => selectItem(i));
});

function selectItem(index) {
  playSelect();
  const item = menuItems[index];
  item.classList.add('selected');
  setTimeout(() => item.classList.remove('selected'), 300);
	// still under construction lol
}
</script>

</body>
</html>
